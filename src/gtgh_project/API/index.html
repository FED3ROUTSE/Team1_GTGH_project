<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Q&A System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            background: #000000;
            color: #e0e0e0;
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 32px;
            border-bottom: 1px solid #333;
            padding-bottom: 16px;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 0.85rem;
            color: #888;
            margin-top: 8px;
        }

        .status {
            display: inline-block;
            font-size: 0.75rem;
            margin-top: 12px;
            color: #888;
        }

        .status.online {
            color: #00ff00;
        }

        .status.offline {
            color: #ff4444;
        }

        .query-section {
            margin-bottom: 32px;
        }

        textarea {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
            border-radius: 0;
        }

        textarea:focus {
            outline: none;
            border-color: #666;
        }

        button {
            background: #222;
            color: #e0e0e0;
            border: 1px solid #444;
            padding: 10px 20px;
            font-family: monospace;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 0;
            transition: all 0.1s ease;
        }

        button:hover {
            background: #333;
            border-color: #666;
        }

        button:active {
            background: #111;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-group {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .examples {
            margin-top: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .example-btn {
            background: #111;
            font-size: 0.75rem;
            padding: 6px 12px;
        }

        .response-section {
            margin-top: 32px;
        }

        .loading {
            text-align: center;
            padding: 32px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 1px solid #333;
            border-top: 1px solid #e0e0e0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .answer-box {
            background: #111;
            border-left: 2px solid #666;
            padding: 20px;
            margin-bottom: 24px;
        }

        .answer-box h3 {
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
        }

        .answer-content {
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .chunks-box {
            margin-top: 24px;
        }

        .chunks-box h3 {
            font-size: 0.85rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 16px;
        }

        .chunk {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 16px;
            margin-bottom: 12px;
        }

        .chunk-meta {
            font-family: monospace;
            font-size: 0.7rem;
            color: #666;
            margin-bottom: 8px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 6px;
        }

        .chunk-content {
            font-size: 0.85rem;
            color: #ccc;
            line-height: 1.5;
        }

        .error {
            background: #111;
            border-left: 2px solid #ff4444;
            padding: 16px;
            font-size: 0.85rem;
            color: #ff8888;
        }

        .info {
            font-size: 0.75rem;
            color: #666;
            margin-top: 8px;
        }

        hr {
            border: none;
            border-top: 1px solid #222;
            margin: 16px 0;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>RAG Q&A</h1>
            <p>Query documents using retrieval-augmented generation</p>
            <div id="apiStatus" class="status">checking...</div>
        </div>

        <div class="query-section">
            <div class="input-group">
                <textarea
                    id="questionInput"
                    rows="3"
                    placeholder="Ask a question about your documents..."
                ></textarea>
                <button id="askButton" onclick="askQuestion()">Ask</button>
            </div>
            <div class="examples">
                <button class="example-btn" onclick="setExample('What are some obligations of companies?')">company obligations</button>
                <button class="example-btn" onclick="setExample('What is the main topic?')">main topic</button>
                <button class="example-btn" onclick="setExample('Summarize the key points')">key points</button>
            </div>
        </div>

        <div class="response-section">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="info">processing...</div>
            </div>
            <div id="response"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080/query';

        async function checkAPI() {
            const statusEl = document.getElementById('apiStatus');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: 'ping' })
                });

                if (response.ok || response.status === 500) {
                    statusEl.innerHTML = 'online';
                    statusEl.className = 'status online';
                } else {
                    throw new Error();
                }
            } catch (error) {
                statusEl.innerHTML = 'offline (server not running)';
                statusEl.className = 'status offline';
            }
        }

        function setExample(question) {
            document.getElementById('questionInput').value = question;
            askQuestion();
        }

        async function askQuestion() {
            const questionInput = document.getElementById('questionInput');
            const question = questionInput.value.trim();

            if (!question) return;

            const askButton = document.getElementById('askButton');
            const loadingDiv = document.getElementById('loading');
            const responseDiv = document.getElementById('response');

            askButton.disabled = true;
            loadingDiv.classList.add('active');
            responseDiv.innerHTML = '';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || `HTTP ${response.status}`);
                }

                const data = await response.json();
                displayResponse(data);

            } catch (error) {
                responseDiv.innerHTML = `
                    <div class="error">
                        error: ${error.message}
                        <div class="info">make sure server is running on port 8080</div>
                    </div>
                `;
            } finally {
                askButton.disabled = false;
                loadingDiv.classList.remove('active');
            }
        }

        function displayResponse(data) {
            const responseDiv = document.getElementById('response');

            let chunksHtml = '';
            if (data.retrieved_chunks && data.retrieved_chunks.length > 0) {
                chunksHtml = '<div class="chunks-box"><h3>sources</h3>';
                data.retrieved_chunks.forEach((chunk, index) => {
                    const metadata = chunk.metadata || {};
                    const source = metadata.source_file || 'unknown';
                    const page = metadata.page_number ? `p.${metadata.page_number}` : '';
                    const metaText = [source, page].filter(Boolean).join(' • ');

                    chunksHtml += `
                        <div class="chunk">
                            <div class="chunk-meta">${metaText || `chunk ${index + 1}`}</div>
                            <div class="chunk-content">${escapeHtml(chunk.content)}</div>
                        </div>
                    `;
                });
                chunksHtml += '</div>';
            }

            responseDiv.innerHTML = `
                <div class="answer-box">
                    <h3>answer</h3>
                    <div class="answer-content">${escapeHtml(data.answer)}</div>
                </div>
                ${chunksHtml}
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        document.getElementById('questionInput').addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                askQuestion();
            }
        });

        checkAPI();
        setInterval(checkAPI, 30000);
    </script>
</body>
</html>
